name: Deploy React Site via FTP
on:
  push:
    branches:
      - main
jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 📦 Install dependencies
        run: npm install
      - name: 🏗️ Build project
        run: npm run build
      - name: 📦 Prepare Deploy Payload
        run: |
          mkdir deploy-payload
          cd dist
          zip -r ../deploy-payload/deploy.zip .
          cd ..
          cat << 'EOF' > deploy-payload/unzip.php
          <?php
          $zipFile = 'deploy.zip';
          if (!file_exists($zipFile)) { die("Error: deploy.zip not found."); }
          
          function deleteDir($dirPath) {
              if (!is_dir($dirPath)) return;
              if (substr($dirPath, strlen($dirPath) - 1, 1) != '/') $dirPath .= '/';
              $files = glob($dirPath . '*', GLOB_MARK);
              foreach ($files as $file) {
                  if (is_dir($file)) deleteDir($file);
                  else unlink($file);
              }
              rmdir($dirPath);
          }
          
          $dir = opendir('.');
          while (($file = readdir($dir)) !== false) {
              if ($file != '.' && $file != '..' && $file != 'deploy.zip' && $file != basename(__FILE__)) {
                  if (is_dir($file)) deleteDir($file);
                  else unlink($file);
              }
          }
          closedir($dir);
          
          $zip = new ZipArchive;
          if ($zip->open($zipFile) === TRUE) {
              $zip->extractTo('.');
              $zip->close();
              echo "Deployment successful.\n";
          } else {
              die("Error: failed to extract.");
          }
          
          unlink($zipFile);
          unlink(basename(__FILE__));
          ?>
          EOF

      - name: 🚀 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./deploy-payload/
          server-dir: ./previa/max-services/
          delete: false

      - name: 🔄 Execute Unzip Script
        run: |
          # Utilizando SITE_URL secret. Se não existir, avise no log.
          if [ -z "${{ secrets.SITE_URL }}" ]; then
            echo "Aviso: SITE_URL não definida, tentando URL hardcoded"
            curl -s -S "https://www.rlhost.com.br/previa/max-services/unzip.php"
          else
            curl -s -S "${{ secrets.SITE_URL }}/previa/max-services/unzip.php"
          fi